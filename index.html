<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Control de entrenamientos: sesiones, grupos de ejercicios, estadísticas y progresión." />
  <title>Gym Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f1115" id="theme-color-meta" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gym Tracker" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Evita FOUC del tema: aplica el tema guardado antes de pintar -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('gt-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        var meta = document.getElementById('theme-color-meta');
        if (meta) meta.setAttribute('content', t === 'dark' ? '#0f1115' : '#e9ebf3');
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header" id="app-header">
      <button class="icon-btn" id="back-btn" aria-label="Atrás" hidden>
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="app-title-wrap">
        <h1 class="app-title" id="app-title">Gym Tracker</h1>
      </div>
      <span aria-hidden="true"></span>
    </header>

    <main id="view" class="view"></main>

    <!-- Aviso si se abre con file:// (los ES modules y el manifest se bloquean por CORS).
         Es un script clásico (no módulo) para que se ejecute aunque app.js esté bloqueado. -->
    <script>
      if (location.protocol === 'file:') {
        document.addEventListener('DOMContentLoaded', function () {
          var v = document.getElementById('view');
          if (v) v.innerHTML =
            '<div class="card" style="border-color:var(--warning);margin-top:8px">' +
            '<h2 style="margin:0 0 8px;font-size:18px">⚠️ Sírvela por HTTP</h2>' +
            '<p class="muted" style="margin:0 0 10px">Has abierto la app con <code>file://</code>. ' +
            'El navegador bloquea los módulos de JavaScript y el manifest por seguridad (CORS), ' +
            'por eso no funciona nada.</p>' +
            '<p class="muted" style="margin:0 0 6px"><b>Solución:</b> abre una terminal en esta carpeta y ejecuta:</p>' +
            '<pre style="background:var(--bg-elev-2);padding:12px;border-radius:10px;overflow:auto">python3 -m http.server 8000</pre>' +
            '<p class="muted" style="margin:6px 0 0">Luego visita <b>http://localhost:8000</b> en el navegador. ' +
            'En GitHub Pages funcionará directamente al servirse por HTTPS.</p>' +
            '</div>';
        });
      }
    </script>

    <nav class="tabbar" id="tabbar">
      <a class="tab" data-route="#/" href="#/">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>Inicio</span>
      </a>
      <a class="tab" data-route="#/reports" href="#/reports">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></svg>
        <span>Informes</span>
      </a>
      <a class="tab" data-route="#/calendar" href="#/calendar">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
        <span>Calendario</span>
      </a>
      <a class="tab" data-route="#/settings" href="#/settings">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Ajustes</span>
      </a>
    </nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
